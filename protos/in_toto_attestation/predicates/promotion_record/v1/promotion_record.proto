syntax = "proto3";

package promo_tools.provenance.v1;

option go_package = "sigs.k8s.io/promo-tools/v4/promoter/image/provenance";

import "google/protobuf/timestamp.proto";

// PromotionRecord captures the details of a single image promotion
// for provenance generation.
message PromotionRecord {
  // src_ref is the fully qualified source image reference.
  string src_ref = 1;

  // dst_ref is the fully qualified destination image reference.
  string dst_ref = 2;

  // digest is the image digest (e.g., "sha256:abc...").
  string digest = 3;

  // timestamp is when the promotion occurred.
  google.protobuf.Timestamp timestamp = 4;

  // builder_id identifies the promotion system
  // (e.g., "https://k8s.io/promo-tools@v4.0.8").
  string builder_id = 5;
}
